<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>雙北 YouBike 場站配置模擬器</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f1419; --panel:#1a212b; --panel-2:#212a36; --line:#2d3847;
  --text:#e8eef7; --muted:#8b9bb0; --accent:#ffb84d; --accent-2:#5dd3b3;
  --accent-3:#a78bfa;
  --ok:#5dd3b3; --warn:#ffb84d; --bad:#ff6b6b; --gray:#6c7a8e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Noto Sans TC","PingFang TC","Helvetica Neue",sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh; max-height:100vh;
  padding:14px 20px;overflow:hidden;
  background-image:radial-gradient(ellipse at top, #1c2738 0%, var(--bg) 50%);
}
.container{max-width:1700px;margin:0 auto;height:calc(100vh - 28px);display:flex;flex-direction:column}
header{margin-bottom:10px;border-bottom:1px solid var(--line);padding-bottom:8px;flex-shrink:0}
h1{
  font-family:"Playfair Display","Noto Serif TC",serif;
  font-size:20px; font-weight:700; letter-spacing:.5px;
  background:linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
}
.subtitle{color:var(--muted);font-size:11px;margin-top:2px;line-height:1.4}
.stats{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:4px 10px;font-size:11px;display:flex;align-items:center;gap:6px}
.stat .dot{width:8px;height:8px;border-radius:50%}
.stat .num{font-weight:700;font-size:14px;color:var(--text)}

.search-bar{
  display:grid;grid-template-columns:1fr repeat(5, minmax(100px,130px));
  gap:8px;margin-bottom:8px;align-items:center;
  background:var(--panel);padding:8px 12px;border-radius:8px;border:1px solid var(--line);flex-shrink:0
}
.search-bar input,.search-bar select{
  background:var(--bg);border:1px solid var(--line);color:var(--text);
  padding:6px 10px;border-radius:5px;font-size:12px;font-family:inherit;width:100%;
}
.search-bar input:focus,.search-bar select:focus{outline:none;border-color:var(--accent)}
.filter-tags{display:flex;gap:6px;margin-bottom:0;flex-wrap:wrap;font-size:11px;color:var(--muted);align-items:center;flex:1}
.filter-tag{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:4px 10px;display:inline-flex;align-items:center;gap:6px;color:var(--text)}
.filter-tag .x{cursor:pointer;color:var(--muted);font-weight:bold}
.filter-tag .x:hover{color:var(--bad)}
.filter-tag .label{color:var(--muted);font-size:11px}
.clear-all{cursor:pointer;color:var(--accent);text-decoration:underline;font-size:11px}
.result-count{font-size:11px;color:var(--muted);white-space:nowrap}

.layout{display:grid;grid-template-columns:300px 1fr;gap:12px;flex:1;min-height:0;position:relative;transition:grid-template-columns .25s ease}
.layout.collapsed{grid-template-columns:0 1fr;gap:0}
.layout.collapsed .station-list{opacity:0;pointer-events:none;border-width:0;padding:0;visibility:hidden}
.collapse-btn{
  position:absolute;left:300px;top:8px;z-index:10;
  background:var(--panel);border:1px solid var(--line);color:var(--muted);
  width:22px;height:48px;border-radius:0 8px 8px 0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  transition:left .25s ease, color .15s;
  margin-left:-1px;
}
.collapse-btn:hover{color:var(--accent);border-color:var(--accent)}
.layout.collapsed .collapse-btn{left:0}
.station-list{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow-y:auto;min-height:0}
.station-item{padding:8px 12px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.station-item:hover{background:var(--panel-2)}
.station-item.active{background:linear-gradient(90deg, rgba(255,184,77,.18), transparent);border-left:3px solid var(--accent);padding-left:11px}
.station-item .badge{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.station-item .info{flex:1;min-width:0}
.station-item .nm{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.station-item .meta{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.station-item .meta .zone-tag{display:inline-block;background:var(--panel-2);color:var(--accent);padding:1px 6px;border-radius:3px;font-size:10px;margin-right:4px;font-family:"JetBrains Mono",monospace}

.detail{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px 18px;overflow-y:auto;min-height:0;display:flex;flex-direction:column;gap:10px}
.detail-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.detail-title h2{font-family:"Playfair Display","Noto Serif TC",serif;font-size:18px;font-weight:600;margin-bottom:2px;display:inline-block;margin-right:10px}
.detail-title .meta{font-size:11px;color:var(--muted);display:inline}
.detail-title .meta .zone-tag{display:inline-block;background:var(--panel-2);color:var(--accent);padding:2px 8px;border-radius:4px;font-size:11px;margin-left:6px;font-family:"JetBrains Mono",monospace}
.bind-tag{display:inline-block;background:rgba(93,211,179,.15);color:var(--accent-2);
  padding:2px 8px;border-radius:4px;font-size:11px;border:1px solid rgba(93,211,179,.3);
  font-family:"JetBrains Mono",monospace}
.level-tag{padding:4px 12px;border-radius:16px;font-size:11px;font-weight:600;letter-spacing:.5px}
.level-tag.lv-優{background:rgba(93,211,179,.15);color:var(--ok);border:1px solid rgba(93,211,179,.4)}
.level-tag.lv-次{background:rgba(255,184,77,.15);color:var(--warn);border:1px solid rgba(255,184,77,.4)}
.level-tag.lv-後{background:rgba(255,107,107,.15);color:var(--bad);border:1px solid rgba(255,107,107,.4)}
.level-tag.lv-無{background:rgba(108,122,142,.15);color:var(--gray);border:1px solid rgba(108,122,142,.4)}

.actions-row{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
  padding:8px 12px;background:linear-gradient(135deg, rgba(167,139,250,.08), rgba(93,211,179,.05));
  border:1px solid rgba(167,139,250,.3);border-radius:8px;
}
.actions-row .magic-btn{
  background:linear-gradient(135deg, var(--accent-3), var(--accent-2));
  color:#1a1a1a;font-weight:700;padding:7px 14px;border:none;border-radius:5px;
  cursor:pointer;font-family:inherit;font-size:12px;display:flex;align-items:center;gap:6px;
  box-shadow:0 2px 8px rgba(167,139,250,.3);white-space:nowrap
}
.actions-row .magic-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.actions-row .magic-btn:disabled{opacity:.5;cursor:not-allowed}
.actions-row .info{font-size:11px;color:var(--muted);flex:1;min-width:120px;line-height:1.4}
.actions-row .info strong{color:var(--accent-3)}

.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ctrl{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:8px 14px;display:flex;align-items:center;gap:10px}
.ctrl label{font-size:12px;color:var(--muted);flex:1}
.ctrl .recommended{font-size:10px;color:var(--accent);margin-top:1px}
.ctrl input{background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:5px 10px;border-radius:5px;font-size:15px;font-weight:600;width:60px;text-align:center;font-family:"JetBrains Mono",monospace}
.ctrl input:focus{outline:none;border-color:var(--accent);background:#2a3340}
.ctrl .stepper{display:flex;flex-direction:column;gap:2px}
.ctrl .stepper button{background:var(--panel-2);border:1px solid var(--line);color:var(--text);width:24px;height:18px;cursor:pointer;font-size:11px;line-height:1;border-radius:3px}
.ctrl .stepper button:hover{border-color:var(--accent);color:var(--accent)}

.btn{background:var(--accent);color:#1a1a1a;border:none;padding:10px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.5px}
.btn:hover{filter:brightness(1.1)}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 12px;font-size:12px}
.reset-row{display:flex;gap:6px;font-size:11px;align-items:center;color:var(--muted);flex-wrap:wrap}

.chart-section{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 14px;flex:1;min-height:340px;display:flex;flex-direction:column}
.chart-title{font-size:10px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;font-weight:500;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;flex-shrink:0}
.line-toggles{display:flex;gap:6px;flex-wrap:wrap}
.line-toggle{
  display:flex;align-items:center;gap:5px;cursor:pointer;
  background:var(--panel-2);border:1px solid var(--line);
  padding:4px 9px;border-radius:14px;font-size:11px;color:var(--muted);
  transition:all .15s;user-select:none;text-transform:none;letter-spacing:0
}
.line-toggle:hover{border-color:var(--accent)}
.line-toggle.on{color:var(--text);border-color:var(--accent-2);background:var(--panel)}
.line-toggle .sw{width:10px;height:10px;border-radius:50%;opacity:.35;transition:opacity .15s}
.line-toggle.on .sw{opacity:1}

.chart-wrap{position:relative;flex:1;min-height:300px}

.timeline{margin-top:8px}
.timeline-title{font-size:10px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;font-weight:500}
.hour-grid{display:grid;grid-template-columns:repeat(18, 1fr);gap:2px;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:8px;overflow-x:auto}
.hour-cell{display:flex;flex-direction:column;align-items:center;padding:4px 3px;border-radius:5px;background:var(--panel-2);position:relative;transition:all .2s;min-width:0}
.hour-cell.violating{background:rgba(255,107,107,.18);box-shadow:inset 0 0 0 1px rgba(255,107,107,.5)}
.hour-cell.has-dispatch{background:rgba(167,139,250,.20);box-shadow:inset 0 0 0 2px var(--accent-3)}
.hour-cell.bound-start{box-shadow:inset 0 0 0 2px var(--accent)}
.hour-cell.afternoon-start{box-shadow:inset 0 0 0 2px var(--accent-2)}
.hour-cell.has-dispatch.violating{box-shadow:inset 0 0 0 2px var(--accent-3), inset 0 0 0 4px rgba(255,107,107,.5)}
.hour-cell .h-label{font-size:10px;color:var(--muted);margin-bottom:1px;font-family:"JetBrains Mono",monospace;display:flex;align-items:center;gap:3px;font-weight:600;line-height:1}
.hour-cell .dispatch-icon{
  cursor:pointer;color:var(--muted);font-size:13px;line-height:1;
  background:none;border:none;padding:0;font-weight:bold;
}
.hour-cell .dispatch-icon:hover{color:var(--accent-3)}
.hour-cell .dispatch-icon.active{color:var(--accent-3);font-weight:bold}
.hour-cell .stock{font-size:20px;font-weight:700;color:var(--text);font-family:"JetBrains Mono",monospace;line-height:1;margin:1px 0}
.hour-cell .stock-input{
  background:var(--panel-2);border:1px solid var(--accent-3);color:var(--accent-3);
  padding:2px 4px;border-radius:3px;font-size:14px;font-weight:700;width:40px;
  text-align:center;font-family:"JetBrains Mono",monospace
}
.hour-cell .stock-input:focus{outline:none;background:#2a2334}
.hour-cell .dispatch-change{
  margin-top:2px;display:flex;flex-direction:column;align-items:center;gap:1px;
  font-size:9px;font-family:"JetBrains Mono",monospace;
}
.hour-cell .dispatch-change .change-label{font-size:8px;color:var(--muted);letter-spacing:.3px;font-weight:600;line-height:1}
.hour-cell .dispatch-change .change-input{
  background:var(--panel-2);border:1px solid var(--accent-3);
  padding:1px 3px;border-radius:3px;font-size:12px;font-weight:700;width:40px;
  text-align:center;font-family:"JetBrains Mono",monospace;
}
.hour-cell .dispatch-change .change-input:focus{outline:none;background:#2a2334}
.hour-cell .dispatch-change.change-in .change-input{color:var(--accent-3);border-color:var(--accent-3)}
.hour-cell .dispatch-change.change-out .change-input{color:var(--warn);border-color:var(--warn)}
.hour-cell .dispatch-change.change-zero .change-input{color:var(--muted);border-color:var(--line)}
.hour-cell .dispatch-change .change-unit{font-size:8px;color:var(--muted);line-height:1}

.hour-cell .delta{font-size:9px;margin-top:2px;font-family:"JetBrains Mono",monospace;line-height:1}
.hour-cell .delta input{width:36px;background:transparent;border:1px dashed var(--line);color:inherit;text-align:center;font-family:inherit;font-size:10px;padding:1px 2px;border-radius:3px;font-weight:600}
.hour-cell .delta input:focus{outline:none;border-color:var(--accent);background:var(--panel)}
.delta-pos{color:var(--bad)}
.delta-neg{color:var(--ok)}
.delta-zero{color:var(--muted)}

.legend{margin-top:4px;display:flex;gap:12px;font-size:9px;color:var(--muted);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-sq{width:10px;height:10px;border-radius:3px}

.summary-row{display:grid;grid-template-columns:repeat(5, 1fr);gap:6px}
@media(max-width:900px){.summary-row{grid-template-columns:repeat(3, 1fr)}}
.summary-card{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:6px 8px;text-align:center}
.summary-card .label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.summary-card .value{font-size:18px;font-weight:700;margin-top:2px;font-family:"JetBrains Mono",monospace;line-height:1}
.summary-card .value.ok{color:var(--ok)}
.summary-card .value.warn{color:var(--warn)}
.summary-card .value.bad{color:var(--bad)}
.summary-card .value.purple{color:var(--accent-3)}
.bottom-row{display:grid;grid-template-columns:1fr 130px;gap:10px;flex:1;min-height:0}
.summary-col{display:flex;flex-direction:column;gap:6px}
.summary-col .summary-card{padding:6px 8px;flex:1;display:flex;flex-direction:column;justify-content:center}


.empty{padding:60px 20px;text-align:center;color:var(--muted)}
.empty .icon{font-size:48px;margin-bottom:12px;opacity:.4}

.station-list::-webkit-scrollbar{width:8px}
.station-list::-webkit-scrollbar-track{background:var(--bg)}
.station-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}

.dispatch-list{
  background:var(--bg);border:1px solid var(--line);border-radius:6px;
  padding:6px 12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center
}
.dispatch-list .title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.dispatch-chip{
  background:var(--panel-2);border:1px solid rgba(167,139,250,.4);color:var(--accent-3);
  padding:2px 8px;border-radius:10px;font-size:10px;display:flex;align-items:center;gap:4px;
  font-family:"JetBrains Mono",monospace
}
.dispatch-chip .x{cursor:pointer;color:var(--muted);font-weight:bold;font-size:14px}
.dispatch-chip .x:hover{color:var(--bad)}
.dispatch-chip.locked{background:var(--panel-2);border-color:var(--line);color:var(--muted)}


@media (max-width:1500px){
  .bottom-row{grid-template-columns:1fr;grid-template-rows:1fr auto}
  .summary-col{flex-direction:row;flex-wrap:wrap}
  .summary-col .summary-card{flex:1;min-width:80px}
}
@media (max-width:1100px){.search-bar{grid-template-columns:1fr 1fr}}
@media (max-width:900px){
  .layout{grid-template-columns:1fr}
  .station-list{max-height:300px}
  .controls{grid-template-columns:1fr}
  .hour-grid{grid-template-columns:repeat(9, 1fr)}
  .chart-wrap{height:280px}
  .search-bar{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
<header>
  <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <h1>雙北 YouBike 場站車輛配置模擬器</h1>
    <div class="stats" id="stats"></div>
  </div>
  <div class="subtitle">民眾借還 2026/05/18~22 · 5天平均保守取整 · 調度曲線可選擇性疊加 · 點 🪄 一鍵自動求最少調度</div>
</header>

<div class="search-bar">
  <input type="text" id="search" placeholder="搜尋場站名稱或代號…">
  <select id="cityFilter"><option value="">全部城市</option></select>
  <select id="districtFilter"><option value="">全部行政區</option></select>
  <select id="zoneFilter"><option value="">全部責任區</option></select>
  <select id="levelFilter">
    <option value="">全部分級</option>
    <option value="最優解">最優解</option>
    <option value="次優解">次優解</option>
    <option value="最後解">最後解</option>
  </select>
  <select id="dateSelect"><option value="">選擇回放日期…</option></select>
</div>
<div id="liveTime" style="font-size:11px;color:#60a5fa;margin-bottom:8px"></div>
<div style="display:flex;gap:12px;align-items:center;margin-bottom:8px;flex-shrink:0">
  <div class="filter-tags" id="filterTags"></div>
  <div class="result-count" id="resultCount"></div>
</div>

<div class="layout" id="layoutEl">
  <div class="station-list" id="stationList"></div>
  <button class="collapse-btn" id="collapseBtn" title="收合/展開場站列表">◀</button>
  <div class="detail" id="detail">
    <div class="empty"><div class="icon">◷</div><div>從左側選一個場站開始</div></div>
  </div>
</div>
</div>

// 載入可用日期清單
async function loadDateIndex(){
  try {
    const resp = await fetch(`${DATA_BASE}/index.json?t=${Date.now()}`);
    if(!resp.ok) return;
    const idx = await resp.json();
    availableDates = Object.keys(idx).sort();
    const sel = document.getElementById('dateSelect');
    if(sel){
      sel.innerHTML = '<option value="">選擇回放日期…</option>' +
        availableDates.map(d=>`<option value="${d}">${d}</option>`).join('');
    }
  } catch(e){ console.log('無 index.json 或載入失敗:', e); }
}

// 載入最新即時快照 (取 index 最後一天的最後一小時)
async function loadLatest(){
  try {
    const resp = await fetch(`${DATA_BASE}/index.json?t=${Date.now()}`);
    if(!resp.ok) return;
    const idx = await resp.json();
    const dates = Object.keys(idx).sort();
    if(!dates.length) return;
    const lastDate = dates[dates.length-1];
    const hours = idx[lastDate];
    const lastHour = hours[hours.length-1];
    const hh = String(lastHour).padStart(2,'0');
    const r2 = await fetch(`${DATA_BASE}/${lastDate}/${hh}.json?t=${Date.now()}`);
    if(!r2.ok) return;
    const snap = await r2.json();
    const map = {};
    snap.stations.forEach(st => { map[st.id] = st.rent; });
    liveData = { datetime: snap.datetime, stations: map };
    const el = document.getElementById('liveTime');
    if(el) el.textContent = '即時資料: ' + snap.datetime.replace('T',' ').slice(0,16);
  } catch(e){ console.log('即時資料載入失敗:', e); }
}

// 載入指定日期全天快照
async function loadReplay(date){
  if(!date){ replayData = null; renderDetail(); return; }
  try {
    const resp = await fetch(`${DATA_BASE}/index.json?t=${Date.now()}`);
    const idx = await resp.json();
    const hours = idx[date] || [];
    const hourly = {};
    await Promise.all(hours.map(async h => {
      const hh = String(h).padStart(2,'0');
      const r = await fetch(`${DATA_BASE}/${date}/${hh}.json?t=${Date.now()}`);
      if(r.ok){
        const snap = await r.json();
        const map = {};
        snap.stations.forEach(st => { map[st.id] = st.rent; });
        hourly[h] = map;
      }
    }));
    replayData = { date, hourly };
    selectedDate = date;
    renderDetail();
  } catch(e){ console.log('回放資料載入失敗:', e); }
}

function getState(code){
  if(!state[code]){
    const s = STATIONS.find(x=>x.code===code);
    const A = s.A!=null ? s.A : Math.floor(s.capacity/2);
    const B = s.B!=null ? s.B : Math.floor(s.capacity/2);
    state[code] = {
      deltas: [...s.deltas],
      dispatches: {6: A, 15: B}  // 預設只有 6 和 15 是調度點
    };
  }
  return state[code];
}

// 庫存計算: 從 6 點開始累積, 遇到調度點則重設
function computeStocks(st, mode='segmented'){
  const stocks = [];
  let cur = st.dispatches[6] || 0;
  stocks.push(cur);
  for(let h=7; h<=23; h++){
    // 從 h-1 到 h: 減去 deltas[h-1]
    cur = cur - st.deltas[h-1];
    if(mode==='segmented' && st.dispatches[h]!==undefined){
      cur = st.dispatches[h];
    }
    stocks.push(cur);
  }
  return stocks;
}

// ===== 自動求解: 最少調度數 =====
function findMinDispatches(deltas, C){
  const dispatches = {};
  let t = 6;
  while(t <= 23){
    let cum = [0];
    let b = t;
    for(let h=t; h<23; h++){
      const newCum = cum.concat([cum[cum.length-1] + deltas[h]]);
      const mx = Math.max(...newCum);
      const mn = Math.min(...newCum);
      if(mx - mn <= C - 2){
        cum = newCum;
        b = h + 1;
      } else break;
    }
    const mx = Math.max(...cum); const mn = Math.min(...cum);
    let v;
    if(mx - mn <= C - 2){
      const vLow = mx + 1;
      const vHigh = C + mn - 1;
      v = Math.floor((vLow + vHigh) / 2);
    } else {
      v = Math.max(1, Math.min(C-1, Math.floor(C/2)));
    }
    dispatches[t] = v;
    t = b + 1;
  }
  return dispatches;
}

function getFilteredStations(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const cf = document.getElementById('cityFilter').value;
  const df = document.getElementById('districtFilter').value;
  const zf = document.getElementById('zoneFilter').value;
  const lf = document.getElementById('levelFilter').value;
  return STATIONS.filter(s=>{
    if(cf && s.city !== cf) return false;
    if(df && s.district !== df) return false;
    if(zf && s.zone !== zf) return false;
    if(lf && s.level !== lf) return false;
    if(q && !(s.name.toLowerCase().includes(q) || s.code.includes(q))) return false;
    return true;
  });
}

  });
  const q = document.getElementById('search').value.trim();
  if(q) tags.push(`<span class="filter-tag"><span class="label">關鍵字:</span> ${q} <span class="x" data-filter="search">×</span></span>`);
  if(tags.length) tags.push('<span class="clear-all" id="clearAll">清除全部</span>');
  document.getElementById('filterTags').innerHTML = tags.join('');
  document.querySelectorAll('.filter-tag .x').forEach(x=>{
    x.addEventListener('click', e=>{
      document.getElementById(e.target.dataset.filter).value = '';
      if(e.target.dataset.filter==='cityFilter') refreshDistrictOptions();
      renderAll();
    });
  });
  const ca = document.getElementById('clearAll');
  if(ca) ca.addEventListener('click', ()=>{
    ['search','cityFilter','districtFilter','zoneFilter','levelFilter'].forEach(id=>{
      document.getElementById(id).value = '';
    });
    refreshDistrictOptions();
    renderAll();
  });
}

function renderList(){
  const list = getFilteredStations();
  document.getElementById('resultCount').textContent = 
    `共 ${list.length} 個場站符合條件${list.length>500?'（清單顯示前 500 個）':''}`;
  const html = list.slice(0,500).map(s=>`
    <div class="station-item ${s.code===currentCode?'active':''}" data-code="${s.code}">
      <div class="badge" style="background:${badgeColor(s.level)}"></div>
      <div class="info">
        <div class="nm">${s.name}</div>
        <div class="meta"><span class="zone-tag">${s.zone||'—'}</span>${s.city} ${s.district} · 車位${s.capacity} · ${s.level}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('stationList').innerHTML = html || '<div style="padding:30px;text-align:center;color:#8b9bb0;font-size:13px">無符合條件的場站</div>';
  document.querySelectorAll('.station-item').forEach(el=>{
    el.addEventListener('click',()=>{
      currentCode = el.dataset.code;
      renderList();
      renderDetail();
    });
  });
}

function renderAll(){
  renderFilterTags();
  renderList();
}

// ===== 圖表繪製 =====
function drawChart(s, st){
  const C = s.capacity;
  const labels = [];
  for(let h=6; h<=23; h++) labels.push(`${h}`);
  
  let stockData, datasetLabel, lineColor;
  if(chartMode === 'segmented'){
    stockData = computeStocks(st, 'segmented');
    datasetLabel = `${s.name} (含調度)`;
    lineColor = '#5dd3b3';
  } else {
    stockData = computeStocks(st, 'continuous');
    datasetLabel = `${s.name} (不調度推演)`;
    lineColor = '#ffb84d';
  }
  
  const pointColors = stockData.map((v,i)=>{
    const h = i + 6;
    if(st.dispatches[h]!==undefined && chartMode==='segmented') return '#a78bfa'; // 調度點紫色
    if(v <= 0 || v >= C) return '#ff6b6b';
    return lineColor;
  });
  const pointRadius = stockData.map((v,i)=>{
    const h = i + 6;
    if(st.dispatches[h]!==undefined && chartMode==='segmented') return 7;
    return 5;
  });
  
  const capacityLine = labels.map(()=>C);
  const zeroLine = labels.map(()=>0);
  // Y軸範圍: 只納入「目前有顯示」的線
  let allVals = [0];
  if(lineVisible.capacity) allVals.push(C);
  if(lineVisible.stock) allVals = allVals.concat(stockData);
  if(lineVisible.people){
    for(let h=6; h<=23; h++) allVals.push(-(s.deltas[h]||0));
  }
  if(lineVisible.dispatch){
    for(let h=6; h<=23; h++) allVals.push(-(s.disp[h]||0));
  }
  if(lineVisible.live && liveData){
    let rent = liveData.stations[s.code];
    if(rent !== undefined && rent !== null) allVals.push(rent);
  }
  if(lineVisible.replay && replayData){
    for(const h in replayData.hourly){
      const v = replayData.hourly[h][s.code];
      if(v !== undefined && v !== null) allVals.push(v);
    }
  }
  // 上下界各往外加 10, 並取整數
  const yMin = Math.floor(Math.min(...allVals)) - 10;
  const yMax = Math.ceil(Math.max(...allVals)) + 10;
  
  const ctx = document.getElementById('stockChart').getContext('2d');
  if(chart) chart.destroy();
  
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: (function(){
        const ds = [];
        // 民眾行為(對場站影響) = 借減還取負號
        if(lineVisible.people){
          const peopleData = [];
          for(let h=6; h<=23; h++) peopleData.push(-(s.deltas[h]||0));
          ds.push({label:'民眾行為(對場站)', data:peopleData, borderColor:'#5dd3b3', borderWidth:2, borderDash:[5,3], pointRadius:3, pointHoverRadius:6, pointBackgroundColor:'#5dd3b3', fill:false, tension:0.1});
        }
        // 調度行為(對場站影響) = 調度借減還取負號
        if(lineVisible.dispatch){
          const dispData = [];
          for(let h=6; h<=23; h++) dispData.push(-(s.disp[h]||0));
          ds.push({label:'調度行為(對場站)', data:dispData, borderColor:'#a78bfa', borderWidth:2, borderDash:[5,3], pointRadius:3, pointHoverRadius:6, pointBackgroundColor:'#a78bfa', fill:false, tension:0.1});
        }
        // 在站車輛數(庫存軌跡) - 預設關
        if(lineVisible.stock){
          ds.push({label:'在站車輛數', data:stockData, borderColor:lineColor, backgroundColor:lineColor+'20', borderWidth:3, pointRadius:pointRadius, pointHoverRadius:9, pointBackgroundColor:pointColors, pointBorderColor:pointColors, fill:false, tension:0.15});
        }
        // 車位上限
        if(lineVisible.capacity){
          ds.push({label:'車位上限', data:capacityLine, borderColor:'#ff6b6b', borderWidth:2, borderDash:[8,4], pointRadius:0, fill:false, tension:0});
        }
        // 即時在站車輛數 (TDX 最新一筆, 單一水平點/線)
        if(lineVisible.live && liveData){
          const code = s.code;
          // TDX 的 id 可能是 StationUID, 嘗試用 code 或帶前綴比對
          let rent = liveData.stations[code];
          if(rent === undefined){
            // 嘗試常見前綴 (YouBike2.0 UID 格式)
            for(const k in liveData.stations){
              if(k.endsWith(code) || k.includes(code)){ rent = liveData.stations[k]; break; }
            }
          }
          if(rent !== undefined && rent !== null){
            // 畫成一條水平線(整天同值), 代表「目前」在站數
            const liveLine = labels.map(()=>rent);
            ds.push({label:'即時在站('+rent+'台)', data:liveLine, borderColor:'#60a5fa', borderWidth:2, borderDash:[2,2], pointRadius:0, fill:false, tension:0});
          }
        }
        // 當日回放: 選定日期每小時在站車輛數
        if(lineVisible.replay && replayData){
          const code = s.code;
          const replayLine = labels.map((_, i)=>{
            const h = i + 6;
            const hourMap = replayData.hourly[h];
            if(!hourMap) return null;
            let rent = hourMap[code];
            if(rent === undefined){
              for(const k in hourMap){
                if(k.endsWith(code) || k.includes(code)){ rent = hourMap[k]; break; }
              }
            }
            return (rent === undefined) ? null : rent;
          });
          ds.push({label:'當日在站('+replayData.date+')', data:replayLine, borderColor:'#f0883e', backgroundColor:'#f0883e22', borderWidth:3, pointRadius:4, pointHoverRadius:7, pointBackgroundColor:'#f0883e', fill:false, tension:0.15, spanGaps:true});
        }
        // 0 線
        if(lineVisible.zero){
          ds.push({label:'0 (見底)', data:zeroLine, borderColor:'#ffb84d', borderWidth:2, pointRadius:0, fill:false, tension:0});
        }
        return ds;
      })()
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index', intersect:false},
      plugins:{
        legend:{position:'top', labels:{color:'#e8eef7', font:{size:12}, usePointStyle:true}},
        tooltip:{
          backgroundColor:'#1a212b', borderColor:'#2d3847', borderWidth:1,
          titleColor:'#ffb84d', bodyColor:'#e8eef7',
          callbacks:{
            afterBody:function(items){
              const idx = items[0].dataIndex;
              const hour = idx + 6;
              const stk = stockData[idx];
              const d = st.deltas[hour] || 0;
              const dp = s.disp[hour] || 0;
              const pImpact = -d;   // 民眾對場站影響
              const dImpact = -dp;  // 調度對場站影響
              const lines = [];
              if(lineVisible.people) lines.push(`民眾行為(對場站): ${pImpact>0?'+':''}${pImpact}`);
              if(lineVisible.dispatch) lines.push(`調度行為(對場站): ${dImpact>0?'+':''}${dImpact}`);
              if(lineVisible.people && lineVisible.dispatch){
                lines.push(`合計影響: ${(pImpact+dImpact)>0?'+':''}${pImpact+dImpact}`);
              }
              if(lineVisible.stock){
                lines.push(`在站車輛數: ${stk}`);
              }
              if(stk <= 0) lines.push('⚠ 見底');
              else if(stk >= C) lines.push('⚠ 爆位');
              if(st.dispatches[hour]!==undefined && chartMode==='segmented'){
                // 計算自然庫存
                let nat;
                if(hour === 6) nat = 0;
                else nat = stockData[idx-1] - st.deltas[hour-1];
                const change = st.dispatches[hour] - nat;
                if(change > 0) lines.push(`▶ 調度點: 調入 +${change} 台 (→ ${st.dispatches[hour]})`);
                else if(change < 0) lines.push(`▶ 調度點: 調出 ${change} 台 (→ ${st.dispatches[hour]})`);
                else lines.push(`▶ 調度點: 不調動 (維持 ${st.dispatches[hour]})`);
              }
              return lines;
            }
          }
        }
      },
      scales:{
        x:{
          ticks:{color:'#8b9bb0', precision:0, stepSize:1},
          grid:{color:'#2d3847'},
          title:{display:true, text:'時刻(整點)', color:'#8b9bb0'}
        },
        y:{
          min:yMin, max:yMax,
          ticks:{
            color:'#8b9bb0',
            precision:0,
            stepSize:Math.max(1, Math.ceil((yMax-yMin)/10)),
            callback:function(v){ return Number.isInteger(v) ? v : null; }
          },
          grid:{color:'#2d3847'},
          title:{display:true, text:(lineVisible.people||lineVisible.dispatch)?'車輛數 / 對場站影響(整數)':'在站車輛數', color:'#8b9bb0'}
        }
      }
    }
  });
}

// ===== 詳細頁渲染 =====
function renderDetail(){
  const s = STATIONS.find(x=>x.code===currentCode);
  if(!s){
    document.getElementById('detail').innerHTML = '<div class="empty"><div class="icon">◷</div><div>從左側選一個場站開始</div></div>';
    return;
  }
  const st = getState(s.code);
  const C = s.capacity;
  const stocks = computeStocks(st, 'segmented');
  
  let morningViol=0, afternoonViol=0;
  for(let i=0; i<9; i++) if(stocks[i]<=0 || stocks[i]>=C) morningViol++;
  for(let i=9; i<18; i++) if(stocks[i]<=0 || stocks[i]>=C) afternoonViol++;
  const totalViol = morningViol + afternoonViol;
  const dispatchCount = Object.keys(st.dispatches).length;
  
  const hours = [];
  for(let h=6; h<=23; h++) hours.push(h);
  
  // 計算每個時刻的「自然庫存」(若該時刻不調度, 從上一狀態自然推演的結果)
  // 內部 dispatches 仍存「絕對庫存值」, 但 UI 顯示差值 = target - natural
  const naturalStocks = []; // 不調度推演
  {
    let cur = 0; // 6點起點視為0 (天初始無車)
    for(let h=6; h<=23; h++){
      if(h>6) cur = cur - st.deltas[h-1];
      naturalStocks.push(cur);
    }
  }
  // 但「自然庫存」其實要根據前面實際的調度決定(因為前面的調度會影響後續)
  // 重新計算: 對於每個時刻 h, natural[h] = 上一時刻 stock - deltas[h-1] (即不在 h 調度的話會是什麼)
  // 6點: natural = 0
  // 7點: natural = stocks[6] - deltas[6]  (此時 stocks[6] = dispatches[6] = A)
  // ...
  const natural = [];
  for(let i=0; i<18; i++){
    const h = i + 6;
    if(h === 6) natural.push(0);
    else {
      // 上一時刻的「調度後庫存」(就是 stocks[i-1]) 減去 deltas[h-1]
      natural.push(stocks[i-1] - st.deltas[h-1]);
    }
  }
  
  const cells = hours.map((h, i)=>{
    const stk = stocks[i];
    const nat = natural[i];
    const change = stk - nat;  // 調入/調出量, 正=調入, 負=調出
    const violating = stk<=0 || stk>=C;
    const hasDispatch = st.dispatches[h]!==undefined;
    const isLocked = (h===6 || h===15);
    const delta = st.deltas[h];
    const deltaCls = delta>0?'delta-pos':(delta<0?'delta-neg':'delta-zero');
    
    let iconHtml;
    if(isLocked){
      iconHtml = '<span class="dispatch-icon active" title="主要配置點(不可刪除)">★</span>';
    } else if(hasDispatch){
      iconHtml = `<button class="dispatch-icon active" data-action="remove" data-hour="${h}" title="移除此調度點">−</button>`;
    } else {
      iconHtml = `<button class="dispatch-icon" data-action="add" data-hour="${h}" title="在此時段新增調度">+</button>`;
    }
    
    // 主顯示: 庫存值
    // 副顯示(若是調度點): 調入/調出量, 並可編輯
    let bodyHtml;
    if(hasDispatch){
      const changeStr = change>0?`+${change}`:`${change}`;
      const changeCls = change>0?'change-in':(change<0?'change-out':'change-zero');
      const changeLabel = change>0?'調入':(change<0?'調出':'不調');
      bodyHtml = `
        <div class="stock">${stk}</div>
        <div class="dispatch-change ${changeCls}">
          <span class="change-label">${changeLabel}</span>
          <input type="number" class="change-input" data-action="set-change" data-hour="${h}" data-natural="${nat}" value="${change}">
          <span class="change-unit">台</span>
        </div>`;
    } else {
      bodyHtml = `<div class="stock">${stk}</div>`;
    }
    
    return `
      <div class="hour-cell ${violating?'violating':''} ${hasDispatch?'has-dispatch':''}">
        <div class="h-label">${h} ${iconHtml}</div>
        ${bodyHtml}
        <div class="delta ${deltaCls}">
          <input type="number" data-action="set-delta" data-hour="${h}" value="${delta}">
        </div>
      </div>
    `;
  }).join('');
  
  const recA = s.A!=null?`建議 ${s.A}`:'—';
  const recB = s.B!=null?`建議 ${s.B}`:'—';
  
  // 調度清單 (顯示調入/調出量)
  const sortedHours = Object.keys(st.dispatches).map(Number).sort((a,b)=>a-b);
  const chipsHtml = sortedHours.map(h=>{
    const locked = (h===6 || h===15);
    const idx = h - 6;
    const nat = natural[idx];
    const stk = stocks[idx];
    const change = stk - nat;
    const changeStr = change>0?`調入 +${change}`:(change<0?`調出 ${change}`:'不調');
    return `<span class="dispatch-chip ${locked?'locked':''}">${String(h).padStart(2,'0')}:00 ${changeStr} 台 (→${stk})${locked?'':` <span class="x" data-action="remove-chip" data-hour="${h}">×</span>`}</span>`;
  }).join('');
  
  document.getElementById('detail').innerHTML = `
    <div class="detail-header">
      <div class="detail-title">
        <h2>${s.name}</h2>
        <div class="meta">${s.code} · ${s.city} ${s.district} <span class="zone-tag">${s.zone||'—'}</span> · 總車位 ${s.capacity} · <span class="bind-tag">平均最大綁車 ${s.avgMaxBind}</span></div>
      </div>
      <div class="level-tag ${levelClass(s.level)}">${s.level}</div>
    </div>
    
    <div class="actions-row">
      <button class="magic-btn" id="autoSolveBtn">🪄 自動求最少調度</button>
      
    </div>
    
    <div class="controls">
      <div class="ctrl">
        <div><label>6:00 配置 (主)</label><div class="recommended">${recA}</div></div>
        <input type="number" id="inputA" value="${st.dispatches[6]}" min="0" max="${C}">
        <div class="stepper"><button onclick="adjustMain(6,1)">▲</button><button onclick="adjustMain(6,-1)">▼</button></div>
      </div>
      <div class="ctrl">
        <div><label>15:00 配置 (主)</label><div class="recommended">${recB}</div></div>
        <input type="number" id="inputB" value="${st.dispatches[15]}" min="0" max="${C}">
        <div class="stepper"><button onclick="adjustMain(15,1)">▲</button><button onclick="adjustMain(15,-1)">▼</button></div>
      </div>
    </div>
    
    <div class="dispatch-list">
      <span class="title">當前調度方案 (${dispatchCount}次)</span>
      ${chipsHtml}
    </div>
    
    <div class="reset-row">
      <button class="btn btn-ghost btn-sm" onclick="resetStation()">還原原始建議</button>
      <button class="btn btn-ghost btn-sm" onclick="clearExtraDispatches()">清除額外調度點(只留6/15)</button>
      
    </div>
    
    <div class="timeline">
      
      <div class="hour-grid">${cells}</div>

    </div>
    
    <div class="bottom-row"><div class="chart-section">
      <div class="chart-title">
        <span>每小時曲線 (6:00 ~ 23:00)</span>
        <div class="line-toggles">
          <label class="line-toggle ${lineVisible.people?'on':''}" data-line="people"><span class="sw" style="background:#5dd3b3"></span>民眾行為</label>
          <label class="line-toggle ${lineVisible.dispatch?'on':''}" data-line="dispatch"><span class="sw" style="background:#a78bfa"></span>調度行為</label>
          <label class="line-toggle ${lineVisible.stock?'on':''}" data-line="stock"><span class="sw" style="background:#5dd3b3"></span>在站車輛數</label>
          <label class="line-toggle ${lineVisible.live?'on':''}" data-line="live"><span class="sw" style="background:#60a5fa"></span>即時在站</label>
          <label class="line-toggle ${lineVisible.replay?'on':''}" data-line="replay"><span class="sw" style="background:#f0883e"></span>當日回放</label>
          <label class="line-toggle ${lineVisible.capacity?'on':''}" data-line="capacity"><span class="sw" style="background:#ff6b6b"></span>車位上限</label>
          <label class="line-toggle ${lineVisible.zero?'on':''}" data-line="zero"><span class="sw" style="background:#ffb84d"></span>0 線</label>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="stockChart"></canvas></div>
    </div>
    
    <div class="summary-col">
      <div class="summary-card"><div class="label">總車位</div><div class="value">${C}</div></div>
      <div class="summary-card"><div class="label">調度次數</div><div class="value purple">${dispatchCount}</div></div>
      <div class="summary-card"><div class="label">上午違反</div><div class="value ${morningViol===0?'ok':(morningViol<=1?'warn':'bad')}">${morningViol}</div></div>
      <div class="summary-card"><div class="label">下午違反</div><div class="value ${afternoonViol===0?'ok':(afternoonViol<=1?'warn':'bad')}">${afternoonViol}</div></div>
      <div class="summary-card"><div class="label">總違反</div><div class="value ${totalViol===0?'ok':(totalViol<=2?'warn':'bad')}">${totalViol}</div></div>
    </div></div>
  `;
  
  drawChart(s, st);
  attachDetailEvents(s, st);
}

function attachDetailEvents(s, st){
  document.querySelectorAll('.line-toggle').forEach(el=>{
    el.addEventListener('click', ()=>{
      const k = el.dataset.line;
      lineVisible[k] = !lineVisible[k];
      renderDetail();
    });
  });
  document.getElementById('autoSolveBtn').addEventListener('click', ()=>{
    const result = findMinDispatches(st.deltas, s.capacity);
    st.dispatches = result;
    // 確保 6 和 15 一定存在
    if(st.dispatches[6]===undefined) st.dispatches[6] = Math.floor(s.capacity/2);
    if(st.dispatches[15]===undefined){
      // 如果 15 不是演算法選的調度點, 設一個合理值 (該時刻的當前庫存)
      const stocks = computeStocks(st, 'segmented');
      st.dispatches[15] = Math.max(1, Math.min(s.capacity-1, stocks[9]));
    }
    renderDetail();
  });
  document.getElementById('inputA').addEventListener('input', e=>{
    const v = parseInt(e.target.value);
    if(!isNaN(v)){ st.dispatches[6] = v; renderDetail(); document.getElementById('inputA').focus(); }
  });
  document.getElementById('inputB').addEventListener('input', e=>{
    const v = parseInt(e.target.value);
    if(!isNaN(v)){ st.dispatches[15] = v; renderDetail(); document.getElementById('inputB').focus(); }
  });
  document.querySelectorAll('.hour-cell .dispatch-icon').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const action = e.target.dataset.action;
      const h = parseInt(e.target.dataset.hour);
      if(action==='add'){
        // 預設值: 該時刻當前的計算庫存值, 限制在 (1, C-1)
        const stocks = computeStocks(st, 'segmented');
        const idx = h - 6;
        let v = stocks[idx];
        v = Math.max(1, Math.min(s.capacity-1, v));
        st.dispatches[h] = v;
        renderDetail();
      } else if(action==='remove'){
        delete st.dispatches[h];
        renderDetail();
      }
    });
  });
  document.querySelectorAll('.hour-cell input[data-action="set-change"]').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const h = parseInt(e.target.dataset.hour);
      const nat = parseInt(e.target.dataset.natural);
      const change = parseInt(e.target.value);
      if(!isNaN(change)){
        st.dispatches[h] = nat + change;
        renderDetail();
        const el = document.querySelector(`.hour-cell input[data-action="set-change"][data-hour="${h}"]`);
        if(el){ el.focus(); el.select(); }
      }
    });
  });
  document.querySelectorAll('.hour-cell input[data-action="set-delta"]').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const h = parseInt(e.target.dataset.hour);
      const v = parseInt(e.target.value);
      if(!isNaN(v)){
        st.deltas[h] = v;
        renderDetail();
        const el = document.querySelector(`.hour-cell input[data-action="set-delta"][data-hour="${h}"]`);
        if(el){ el.focus(); el.select(); }
      }
    });
  });
  document.querySelectorAll('.dispatch-chip .x').forEach(x=>{
    x.addEventListener('click', e=>{
      const h = parseInt(e.target.dataset.hour);
      delete st.dispatches[h];
      renderDetail();
    });
  });
}

function adjustMain(hour, dir){
  const s = STATIONS.find(x=>x.code===currentCode);
  if(!s) return;
  const st = getState(s.code);
  st.dispatches[hour] = Math.max(0, Math.min(s.capacity, (st.dispatches[hour]||0) + dir));
  renderDetail();
}
function resetStation(){
  const s = STATIONS.find(x=>x.code===currentCode);
  if(!s) return;
  delete state[s.code];
  renderDetail();
}
function clearExtraDispatches(){
  const s = STATIONS.find(x=>x.code===currentCode);
  if(!s) return;
  const st = getState(s.code);
  const newDp = {};
  if(st.dispatches[6]!==undefined) newDp[6] = st.dispatches[6];
  if(st.dispatches[15]!==undefined) newDp[15] = st.dispatches[15];
  st.dispatches = newDp;
  renderDetail();
}
function setMode(m){ chartMode = m; renderDetail(); }

document.getElementById('collapseBtn').addEventListener('click', ()=>{
  const layout = document.getElementById('layoutEl');
  const btn = document.getElementById('collapseBtn');
  layout.classList.toggle('collapsed');
  btn.textContent = layout.classList.contains('collapsed') ? '▶' : '◀';
  // 觸發圖表 resize
  if(chart) setTimeout(()=>chart.resize(), 280);
});


document.getElementById('search').addEventListener('input', renderAll);
document.getElementById('cityFilter').addEventListener('change', ()=>{ refreshDistrictOptions(); renderAll(); });
document.getElementById('districtFilter').addEventListener('change', renderAll);
document.getElementById('zoneFilter').addEventListener('change', renderAll);
document.getElementById('levelFilter').addEventListener('change', renderAll);

document.getElementById('dateSelect').addEventListener('change', e=>{
  loadReplay(e.target.value);
});

renderAll();
if(STATIONS.length){
  currentCode = STATIONS[0].code;
  renderList();
  renderDetail();
}

// 載入即時與日期資料 (若 repo 有 data/ 才會成功, 否則靜默略過)
loadDateIndex();
loadLatest().then(()=>{ if(currentCode) renderDetail(); });
// 每小時自動重新抓最新 (頁面開著時)
setInterval(()=>{ loadLatest().then(()=>{ if(currentCode) renderDetail(); }); }, 3600*1000);
</script>
</body>
</html>
